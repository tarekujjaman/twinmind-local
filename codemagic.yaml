workflows:
  android-debug-build:
    name: TwinMind Local - Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Set gradlew executable
        script: chmod +x gradlew

      - name: Build debug APK
        script: ./gradlew assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
